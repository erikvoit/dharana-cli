name: CI
on:
  pull_request:
  push:
    branches: [main]
permissions:
  contents: read
jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24.x'
          cache: true
      - shell: bash
        run: |
          unformatted="$(gofmt -l .)"
          if test -n "$unformatted"; then
            printf 'The following Go files require formatting:\n%s\n' "$unformatted"
            exit 1
          fi
      - run: go test ./...
      - run: go vet ./...
      - run: go build ./cmd/dharana
  race:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24.x'
          cache: true
      - run: go test -race ./internal/asana ./internal/auth ./internal/automation ./internal/cli ./internal/plan ./internal/syncer ./internal/work ./internal/workflowstate
