apiVersion: dharana.dev/v1alpha1
kind: EpicPlan
metadata:
  id: payment-recovery
  context: payments
spec:
  removalPolicy: preserve
  epic:
    id: epic
    name: Payment recovery
    description:
      format: markdown
      content: |
        # Outcome

        Recover failed payment attempts **safely** without duplicating charges.
  work:
    - id: diagnose-failure
      type: spike
      name: Diagnose failed recovery state
      timebox: 4h
      completed: false
    - id: persist-state
      type: bug
      name: Persist recovery state correctly
      priority: P1
      completed: false
      blockedBy:
        - diagnose-failure
      tasks:
        - id: regression-test
          name: Add recovery-state regression coverage
          completed: false
    - id: expose-retry
      type: story
      name: Customer can retry a failed payment
      description:
        format: markdown
        content: |
          ## Acceptance criteria

          - Retrying is idempotent.
          - Failures remain observable.
      completed: false
      blockedBy:
        - persist-state
      tasks:
        - id: retry-endpoint
          name: Implement retry endpoint
          estimate: 4h
          description:
            format: markdown
            content: |
              Add the endpoint and its **integration tests**.
          completed: false
