apiVersion: dharana.dev/v1alpha1
kind: EpicPlan
metadata:
  id: payment-recovery
  context: payments
spec:
  removalPolicy: preserve
  epic:
    id: epic
    name: Payment recovery
    notes: Recover failed payment attempts safely.
  work:
    - id: diagnose-failure
      type: spike
      name: Diagnose failed recovery state
      timebox: 4h
      completed: false
    - id: persist-state
      type: bug
      name: Persist recovery state correctly
      priority: P1
      completed: false
      blockedBy:
        - diagnose-failure
      tasks:
        - id: regression-test
          name: Add recovery-state regression coverage
          completed: false
    - id: expose-retry
      type: story
      name: Customer can retry a failed payment
      completed: false
      blockedBy:
        - persist-state
      tasks:
        - id: retry-endpoint
          name: Implement retry endpoint
          estimate: 4h
          completed: false
